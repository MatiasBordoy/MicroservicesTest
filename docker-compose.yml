name: micro-services-example

services:
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  sqldb:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: employee_sql
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "14330:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - microservices-net
    restart: unless-stopped

  employeeservice.api:
    image: employee-service.api:dev
    build:
      context: .
      dockerfile: Services/EmployeeService/src/EmployeeService.Api/Dockerfile
    container_name: employee_api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080  # allow http traffic on port 8080
      - Redis__Host=redis:6379 
      - ConnectionStrings__Default=Server=sqldb;Database=EmployeeServiceDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;
    depends_on:
      - redis
      - sqldb
    networks:
      - microservices-net
    restart: unless-stopped

  authservice.api:
    image: auth-service.api:dev
    build:
      context: .
      dockerfile: Services/AuthService/src/AuthService.Api/Dockerfile
    container_name: auth_api
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080  # allow http traffic on port 8080
      - Redis__Host=redis:6379 
      - ConnectionStrings__Default=Server=sqldb;Database=AuthServiceDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;
    depends_on:
      - redis
      - sqldb
    networks:
      - microservices-net
    restart: unless-stopped

volumes:
  sqlserver_data:

networks:
  microservices-net:
    driver: bridge
